name: 'cortex_research_intelligence'
version: '1.0.0'
config-version: 2

profile: 'cortex_research'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  cortex_model: 'mistral-large'
  sentiment_threshold: 0.3

models:
  cortex_research_intelligence:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: staging
      +materialized: ephemeral
    marts:
      analytics:
        +schema: analytics
        +materialized: table
      ml:
        +schema: ml
        +materialized: table
