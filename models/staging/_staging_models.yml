version: 2

models:
  - name: stg_earnings_calls
    description: "Cleaned and deduplicated earnings call transcripts"
    columns:
      - name: call_id
        tests:
          - unique
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: call_date
        tests:
          - not_null

  - name: stg_sec_filings
    description: "Cleaned SEC filing sections"
    columns:
      - name: filing_id
        tests:
          - unique
          - not_null

  - name: stg_stock_prices
    description: "Cleaned daily stock prices"
    columns:
      - name: price_id
        tests:
          - unique
          - not_null
